<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPR 全部历史数据</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 30px 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            padding: 40px;
        }

        /* 表格 */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 10px;
            border: 1px solid #e8ecf1;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        thead {
            background: #1a1a2e;
            color: white;
        }
        thead th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 500;
            white-space: nowrap;
        }
        tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }
        tbody tr:hover {
            background: #f8f9fc;
        }
        tbody td {
            padding: 12px 16px;
            color: #333;
        }
        tbody tr.latest-row {
            background: #eef1ff;
            font-weight: 500;
        }
        tbody tr.latest-row td:first-child::after {
            content: ' 🆕';
            font-size: 12px;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
            color: #ccc;
            font-size: 12px;
        }

        @media (max-width: 600px) {
            .container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 只保留表格 -->
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>1年期 LPR</th>
                        <th>5年期以上 LPR</th>
                    </tr>
                </thead>
                <tbody>
                    {{historyRows}}
                </tbody>
            </table>
        </div>

        <div class="footer">
            Powered by GitHub Actions &amp; Node.js
        </div>
    </div>
</body>
</html>
