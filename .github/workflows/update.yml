name: updateLPR
on: 
  push:
  pull_request:
  schedule:
    - cron: 30 9 19-25 * *
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Nodejs
        uses: actions/setup-node@v4
        with: 
          node-version: 18
      - name: checkout <LPR.XML>
        uses: moonrailgun/branch-filestorage-action@latest # 替换为兼容Node24最新tag
        with: 
            path: LPR.xml
      - name: Install Dependency
        run: npm install 
      - name: Update LPR.xml
        run: node ./index.js
